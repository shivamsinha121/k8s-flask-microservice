apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: poc-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-container
        image: flask-app
        imagePullPolicy: Never
        ports:
          - containerPort: 5000

        envFrom:
        - configMapRef:
            name: app-config

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10